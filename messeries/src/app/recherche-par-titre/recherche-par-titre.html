<div class="container">
  <form class="form-inline">
    <div class="form-group mx-sm-3 mb-2 mt-2 ">
      <label>Titre Série en tapant (Pipe)</label>
      <input #nom [(ngModel)]="searchTerm" name="searchTerm" class="form-control" >
    </div>
  </form>

  <div class="card shadow mb-4">
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Code</th>
            <th>Titre</th>
            <th>Épisodes</th>
            <th>Date Lancement</th>
            <th>Pays</th>
          </tr>
        </thead>
        @for (serie of series | searchFilter: searchTerm; track serie.codeSerie) {
          <tbody>
            <tr>
              <td>{{serie.codeSerie}}</td>
              <td>{{serie.titreSerie}}</td>
              <td>{{serie.nombreEpisodes}}</td>
              <td>{{serie.dateLancement | date:'dd/MM/yyyy'}}</td>
              <td>
                @if(serie.pays){
                  {{serie.pays.nomPays}}
                } @else {
                  PAS DE PAYS
                }
              </td>
              <!--
              <td><a class="btn btn-danger" (click)="supprimerSerie(serie)">Supprimer</a></td>
              <td><a class="btn btn-success" [routerLink]="['/updateSerie',serie.codeSerie]">Modifier</a></td> 
              -->
            </tr>
          </tbody>
        }
      </table>
    </div>
  </div>
</div>
